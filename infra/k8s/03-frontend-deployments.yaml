---
# ─── Web Dashboard ───────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veritas-web
  namespace: veritas
  labels:
    app: veritas-web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veritas-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: veritas-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: web
          image: gcr.io/YOUR_GCP_PROJECT/veritas-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.veritas.io/api"
            - name: NEXT_PUBLIC_VERIFICATION_URL
              value: "https://verify.veritas.io"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: veritas-web-service
  namespace: veritas
spec:
  selector:
    app: veritas-web
  ports:
    - port: 3000
      targetPort: 3000

---
# ─── Verification Portal ─────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: veritas-verification
  namespace: veritas
  labels:
    app: veritas-verification
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: veritas-verification
  template:
    metadata:
      labels:
        app: veritas-verification
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: verification
          image: gcr.io/YOUR_GCP_PROJECT/veritas-verification:latest
          ports:
            - containerPort: 3001
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.veritas.io/api"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: veritas-verification-service
  namespace: veritas
spec:
  selector:
    app: veritas-verification
  ports:
    - port: 3001
      targetPort: 3001
