---
# IMPORTANT: Never commit real secrets to Git.
# This is a TEMPLATE only. Populate with:
#   kubectl create secret generic veritas-secrets \
#     --from-literal=DATABASE_URL="postgresql://..." \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 64)" \
#     --from-literal=QR_HMAC_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=STORAGE_ENCRYPTION_KEY="$(openssl rand -base64 32 | head -c 32)" \
#     --from-literal=REDIS_PASSWORD="..." \
#     --namespace=veritas
#
# Or use External Secrets Operator with GCP Secret Manager (recommended for production)

apiVersion: v1
kind: Secret
metadata:
  name: veritas-secrets
  namespace: veritas
  annotations:
    # Managed by External Secrets Operator in production
    externalsecrets.io/managed: "true"
type: Opaque
data:
  # Base64-encoded placeholder values — replace before applying
  DATABASE_URL: REPLACE_WITH_BASE64
  JWT_SECRET: REPLACE_WITH_BASE64
  QR_HMAC_SECRET: REPLACE_WITH_BASE64
  STORAGE_ENCRYPTION_KEY: REPLACE_WITH_BASE64
  REDIS_PASSWORD: REPLACE_WITH_BASE64
  SMTP_USER: REPLACE_WITH_BASE64
  SMTP_PASS: REPLACE_WITH_BASE64
  GCS_PROJECT_ID: REPLACE_WITH_BASE64
