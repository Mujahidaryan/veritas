---
# NGINX Ingress Controller configuration
# Requires: cert-manager for TLS, NGINX ingress controller installed
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: veritas-ingress
  namespace: veritas
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Rate limiting on public verification endpoint
    nginx.ingress.kubernetes.io/limit-rps: "20"
spec:
  tls:
    - hosts:
        - api.veritas.io
        - app.veritas.io
        - verify.veritas.io
      secretName: veritas-tls-cert
  rules:
    - host: api.veritas.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: veritas-api-service
                port:
                  number: 4000

    - host: app.veritas.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: veritas-web-service
                port:
                  number: 3000

    - host: verify.veritas.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: veritas-verification-service
                port:
                  number: 3001

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: veritas-redis
  namespace: veritas
spec:
  serviceName: veritas-redis-service
  replicas: 1
  selector:
    matchLabels:
      app: veritas-redis
  template:
    metadata:
      labels:
        app: veritas-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--save", "60", "1", "--requirepass", "$(REDIS_PASSWORD)"]
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: veritas-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: veritas-redis-service
  namespace: veritas
spec:
  selector:
    app: veritas-redis
  ports:
    - port: 6379
      targetPort: 6379
  clusterIP: None
