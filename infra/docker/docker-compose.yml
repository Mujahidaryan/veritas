version: '3.9'

# Veritas — Local Development Stack
# Starts: PostgreSQL, Redis, Fabric (orderer + peers), API, Web
# Usage: npm run docker:up

networks:
  veritas-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  fabric-data:

services:

  # ─── Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: veritas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas_dev
      POSTGRES_DB: veritas_db
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U veritas -d veritas_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - veritas-net

  # ─── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: veritas-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - veritas-net

  # ─── Hyperledger Fabric — Orderer ────────────────────────────────
  fabric-orderer:
    image: hyperledger/fabric-orderer:2.5
    container_name: veritas-fabric-orderer
    restart: unless-stopped
    environment:
      FABRIC_LOGGING_SPEC: INFO
      ORDERER_GENERAL_LISTENADDRESS: 0.0.0.0
      ORDERER_GENERAL_LISTENPORT: 7050
      ORDERER_GENERAL_LOCALMSPID: OrdererMSP
      ORDERER_GENERAL_LOCALMSPDIR: /var/hyperledger/orderer/msp
      ORDERER_GENERAL_TLS_ENABLED: 'true'
      ORDERER_GENERAL_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_GENERAL_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_GENERAL_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_GENERAL_BOOTSTRAPMETHOD: none
      ORDERER_CHANNELPARTICIPATION_ENABLED: 'true'
      ORDERER_ADMIN_TLS_ENABLED: 'true'
      ORDERER_ADMIN_TLS_CERTIFICATE: /var/hyperledger/orderer/tls/server.crt
      ORDERER_ADMIN_TLS_PRIVATEKEY: /var/hyperledger/orderer/tls/server.key
      ORDERER_ADMIN_TLS_ROOTCAS: '[/var/hyperledger/orderer/tls/ca.crt]'
      ORDERER_ADMIN_LISTENADDRESS: 0.0.0.0:7053
    ports:
      - '7050:7050'
      - '7053:7053'
    volumes:
      - fabric-data:/var/hyperledger/production/orderer
      - ../fabric/crypto-config/ordererOrganizations/veritas.io/orderers/orderer.veritas.io/msp:/var/hyperledger/orderer/msp
      - ../fabric/crypto-config/ordererOrganizations/veritas.io/orderers/orderer.veritas.io/tls:/var/hyperledger/orderer/tls
      - ../fabric/channel-artifacts/genesis.block:/var/hyperledger/orderer/orderer.genesis.block
    networks:
      - veritas-net

  # ─── Hyperledger Fabric — Peer ───────────────────────────────────
  fabric-peer:
    image: hyperledger/fabric-peer:2.5
    container_name: veritas-fabric-peer
    restart: unless-stopped
    environment:
      CORE_VM_ENDPOINT: unix:///host/var/run/docker.sock
      CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE: veritas-net
      FABRIC_LOGGING_SPEC: INFO
      CORE_PEER_TLS_ENABLED: 'true'
      CORE_PEER_GOSSIP_USELEADERELECTION: 'true'
      CORE_PEER_GOSSIP_ORGLEADER: 'false'
      CORE_PEER_PROFILE_ENABLED: 'false'
      CORE_PEER_TLS_CERT_FILE: /etc/hyperledger/fabric/tls/server.crt
      CORE_PEER_TLS_KEY_FILE: /etc/hyperledger/fabric/tls/server.key
      CORE_PEER_TLS_ROOTCERT_FILE: /etc/hyperledger/fabric/tls/ca.crt
      CORE_PEER_ID: peer0.veritas.io
      CORE_PEER_ADDRESS: peer0.veritas.io:7051
      CORE_PEER_LISTENADDRESS: 0.0.0.0:7051
      CORE_PEER_CHAINCODEADDRESS: peer0.veritas.io:7052
      CORE_PEER_CHAINCODELISTENADDRESS: 0.0.0.0:7052
      CORE_PEER_GOSSIP_BOOTSTRAP: peer0.veritas.io:7051
      CORE_PEER_GOSSIP_EXTERNALENDPOINT: peer0.veritas.io:7051
      CORE_PEER_LOCALMSPID: VeritasMSP
      CORE_OPERATIONS_LISTENADDRESS: peer0.veritas.io:9444
      CORE_METRICS_PROVIDER: prometheus
    ports:
      - '7051:7051'
      - '9444:9444'
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - fabric-data:/var/hyperledger/production
      - ../fabric/crypto-config/peerOrganizations/veritas.io/peers/peer0.veritas.io/msp:/etc/hyperledger/fabric/msp
      - ../fabric/crypto-config/peerOrganizations/veritas.io/peers/peer0.veritas.io/tls:/etc/hyperledger/fabric/tls
    depends_on:
      - fabric-orderer
    networks:
      - veritas-net

  # ─── API ─────────────────────────────────────────────────────────
  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    container_name: veritas-api
    restart: unless-stopped
    env_file:
      - ../../apps/api/.env
    environment:
      DATABASE_URL: postgresql://veritas:veritas_dev@postgres:5432/veritas_db
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      FABRIC_PEER_ENDPOINT: fabric-peer:7051
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veritas-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Web Dashboard ───────────────────────────────────────────────
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    container_name: veritas-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_VERIFICATION_URL: http://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - api
    networks:
      - veritas-net

  # ─── Verification Portal ─────────────────────────────────────────
  verification-portal:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.verification
    container_name: veritas-verification
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - '3001:3001'
    networks:
      - veritas-net
